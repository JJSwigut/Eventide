<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <clipPath id="mapCrop">
      <rect x="430" width="594" height="500"/>
    </clipPath>
    <filter id="mapShadow" x="-30%" y="-20%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#003b43" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="#005560"/>

  <!-- Real product imagery: the current Eventide station map. -->
  <g clip-path="url(#mapCrop)">
    <image x="430" y="-238" width="594" height="1056" preserveAspectRatio="xMidYMid slice"
        xlink:href="fastlane/metadata/android/en-US/images/phoneScreenshots/01-station-map.png"/>
    <rect x="430" width="594" height="500" fill="#dff5f5" opacity="0.08"/>
  </g>

  <!-- Quiet separation between the brand field and the product image. -->
  <rect x="422" width="8" height="500" fill="#8bd5da"/>

  <!-- Exact shipping launcher artwork; no redrawn approximation. -->
  <image x="58" y="58" width="108" height="108"
      xlink:href="app/src/main/res/mipmap-xxxhdpi/ic_eventide.png"/>

  <text x="58" y="254" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700">Eventide</text>
  <text x="61" y="304" fill="#dff5f5" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="600">Tides, weather &amp;</text>
  <text x="61" y="340" fill="#dff5f5" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="600">marine conditions</text>
  <text x="61" y="405" fill="#8bd5da" font-family="Arial, Helvetica, sans-serif" font-size="21">Know the water before you go.</text>

