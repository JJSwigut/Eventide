name: Android CI/CD Release

on:
  workflow_dispatch:
  push:
    branches:
      - main # Triggers on pushes to the main branch

jobs:
  build-and-release:
    name: Build, Sign, and Release AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs: # Define outputs to be used by other jobs if needed (e.g. for Play Store upload)
      VERSION_NAME: ${{ steps.extract_version.outputs.VERSION_NAME }}
      VERSION_CODE: ${{ steps.set_version_code.outputs.VERSION_CODE }}
      AAB_PATH: ${{ steps.build_aab.outputs.AAB_PATH }}
      AAB_NAME: ${{ steps.build_aab.outputs.AAB_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # with: # If creating tags and releases, often good to fetch full history
        #   fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract Version Name
        id: extract_version
        run: |
          VERSION_NAME=$(grep "versionName = " build-logic/convention/src/main/kotlin/AndroidApplicationConventionPlugin.kt | sed 's/.*versionName = "\([^"]*\)".*/\1/')
          echo "Extracted versionName: $VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Set Version Code
        id: set_version_code
        run: |
          CALCULATED_VERSION_CODE=$(( ${{ github.run_number }} + 9 ))
          echo "Using github.run_number (${{ github.run_number }}) with offset +9. Calculated versionCode: $CALCULATED_VERSION_CODE"
          echo "VERSION_CODE=$CALCULATED_VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode Keystore and Create Properties File
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          APP_KEY_ALIAS: ${{ secrets.APP_KEY_ALIAS }}
          APP_KEY_PASSWORD: ${{ secrets.APP_KEY_PASSWORD }}
          APP_STORE_PASSWORD: ${{ secrets.APP_STORE_PASSWORD }}
        run: |
          echo "Decoding Keystore..."
          echo "$KEYSTORE_BASE64" | base64 --decode > app/eventide.jks
          echo "Creating keystore.properties..."
          echo "storeFile=eventide.jks" > app/keystore.properties
          echo "storePassword=$APP_STORE_PASSWORD" >> app/keystore.properties
          echo "keyAlias=$APP_KEY_ALIAS" >> app/keystore.properties
          echo "keyPassword=$APP_KEY_PASSWORD" >> app/keystore.properties
          echo "Keystore and properties file created."

      - name: Build Signed AAB
        id: build_aab
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease -PoverrideVersionCode=${{ steps.set_version_code.outputs.VERSION_CODE }}
          AAB_FILE_PATH=$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1)
          echo "AAB_PATH=$AAB_FILE_PATH" >> $GITHUB_OUTPUT
          echo "AAB_NAME=$(basename "$AAB_FILE_PATH")" >> $GITHUB_OUTPUT
          echo "Signed AAB created at $AAB_FILE_PATH"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This is automatically provided by GitHub
        with:
          tag_name: v${{ steps.extract_version.outputs.VERSION_NAME }}_build-${{ steps.set_version_code.outputs.VERSION_CODE }}
          name: Release v${{ steps.extract_version.outputs.VERSION_NAME }} (Build ${{ steps.set_version_code.outputs.VERSION_CODE }})
          body: |
            Automated release for version ${{ steps.extract_version.outputs.VERSION_NAME }}, build ${{ steps.set_version_code.outputs.VERSION_CODE }}.
            Triggered by commit ${{ github.sha }}.
          files: ${{ steps.build_aab.outputs.AAB_PATH }}
          draft: false
          prerelease: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Fastlane dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Deploy to Google Play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_TRACK: ${{ vars.PLAY_TRACK }}
          PLAY_RELEASE_STATUS: ${{ vars.PLAY_RELEASE_STATUS }}
          AAB_PATH: ${{ steps.build_aab.outputs.AAB_PATH }}
        run: |
          ls -la "$(dirname "$AAB_PATH")"
          bundle exec fastlane android deploy
